name: vivienda-merida
channels:
  - conda-forge
dependencies:
  - python=3.11
  # Análisis
  - pandas
  - numpy
  - scipy
  - scikit-learn
  - statsmodels
  # Lectura/parseo de fuentes (HTML del cubo, xls/xlsx)
